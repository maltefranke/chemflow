## Put your data args here

root_path: ${oc.env:PROJECT_ROOT}/data
preprocess_workers: 0

n_atoms_strategy: "uniform" # "fixed", "approx"
optimal_transport: "equivariant"
ins_noise_scale: 0.25
move_noise_scale: 0.2

# tmQM contains charged complexes (q in {-1, 0, 1}) but we run pointcloud-only
# and ignore the per-molecule charge — leave validity gating off.
allow_charged: false


# Preprocessing configuration - computes tokens from data and distributions from training dataset only
preprocessing:
  _target_: chemflow.dataset.preprocessing.Preprocessing
  _recursive_: false
  root: ${data.root_path}/tmQM
  train_dataset: ${data.datamodule.datasets.train}
  # Canonical (representation-agnostic) cache. tmQM has no source bonds and no
  # per-atom formal charges, so the canonical edge / charge vocabs fall back to
  # singleton tokens (see preprocessing._compute_tokens_from_data).
  atom_tokens_path: ${data.preprocessing.root}/processed/atom_tokens.txt
  edge_tokens_path: ${data.preprocessing.root}/processed/edge_tokens.txt
  charge_tokens_path: ${data.preprocessing.root}/processed/charge_tokens.txt
  distributions_path: ${data.preprocessing.root}/processed/distributions.pt

vocab: None

interpolator:
  _target_: chemflow.flow_matching.interpolation.Interpolator
  n_atoms_strategy: ${data.n_atoms_strategy}
  # will be set in the instantiate method
  vocab: ${data.vocab}
  distributions: None
  optimal_transport: ${data.optimal_transport}
  ins_noise_scale: ${data.ins_noise_scale}
  del_schedule: ${schedule}
  ins_schedule: ${schedule}
  sub_schedule:
    _target_: chemflow.flow_matching.schedules.SmoothstepSchedule
    shift: 1.5
  sub_e_schedule:
    _target_: chemflow.flow_matching.schedules.SmoothstepSchedule
    shift: 1.5

datamodule:
  _target_: chemflow.dataset.lightning_datamodule.LightningDataModule
  # tokens and distributions will be passed from preprocessing in run.py

  vocab: ${data.vocab}
  distributions: None
  representation: ${representation}

  datasets:
    train:
      _target_: chemflow.dataset.tmqm.FlowMatchingTMQMDataset
      root: ${data.root_path}/tmQM
      vocab: ${data.vocab}
      distributions: None

    val:
      - _target_: chemflow.dataset.tmqm.FlowMatchingTMQMDataset
        root: ${data.root_path}/tmQM
        vocab: ${data.vocab}
        distributions: None

    test:
      - _target_: chemflow.dataset.tmqm.FlowMatchingTMQMDataset
        root: ${data.root_path}/tmQM
        vocab: ${data.vocab}
        distributions: None

  interpolator: ${data.interpolator}

  rotate: ${model.rotate}
  n_augmentations: ${model.n_augmentations}

  num_workers:
    train: 4
    val: 0
    test: 0
    predict: 0

  # tmQM molecules are much larger than QM9 (cap 120 atoms vs ~29) and the
  # pointcloud wrapper builds a fully-connected graph (O(N^2) edges). Batch
  # sizes are sized for a 40–48 GB GPU; raise if you have more headroom.
  batch_size:
    train: 64
    val: 32
    test: 16

  n_atoms_strategy: ${data.n_atoms_strategy}
  optimal_transport: ${data.optimal_transport}
  time_dist: ${model.module.time_dist}
