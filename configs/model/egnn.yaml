## Put your model args here
gmm_params:
    K: 5
    D: 3
  
rotate: false
n_augmentations: 1


integrator:
  _target_: chemflow.flow_matching.integration.RateIntegrator
  vocab: ${data.vocab}
  distributions: None
  gmm_params: ${model.gmm_params}
  n_atoms_strategy: ${data.n_atoms_strategy}
  # strategy used for sampling time during **integration**
  # NOTE can be different from the time strategy used for the model (see below)
  time_strategy: log # "linear" or "log"
  num_integration_steps: 200
  del_schedule: ${data.interpolator.del_schedule}
  ins_schedule: ${data.interpolator.ins_schedule}
  sub_schedule: ${data.interpolator.sub_schedule}
  sub_e_schedule: ${data.interpolator.sub_e_schedule}
  

beta_sched:
  # Beta distribution for time scheduling. 1.0 , 1.0 is equivalent to uniform distribution.
  # SEMLAFLOW uses 2.0, 1.0
  _target_: torch.distributions.Beta
  concentration1: 2.0
  concentration0: 1.0

linear_sched:
  _target_: torch.distributions.Uniform
  low: 0.0
  high: 1.0

# strategy used for sampling time during **training**
sample_time_strategy: linear

module:
  _target_: chemflow.model.lightning_module.LightningModuleRates
  # args and kwargs 
  # tokens and atom_type_distribution will be passed from preprocessing in run.py
  gmm_params: ${model.gmm_params}
  n_atoms_strategy: ${data.n_atoms_strategy}
  ins_noise_scale: ${data.ins_noise_scale}
  ema_decay: 0.999
  use_ema_for_eval: false
  use_time_weights: false
  time_dist: ${if:${eq:${model.sample_time_strategy}, log}, ${model.beta_sched}, ${model.linear_sched}}

  cfg_adapter: ${cfg.cfg_adapter}

  integrator: ${model.integrator}

  vocab: ${data.vocab}
  
  # Loss component weights
  use_learnable_loss_weights: false
  loss_weights:
    do_sub_a: 1.0
    sub_a_class: 1.0
    do_sub_e: 1.0
    sub_e_class: 1.0
    do_del: 1.0
    do_ins: 1.0
    ins_rate: 1.0
    ins_gmm: 1.0
    ins_e: 1.0
    x: 1.0
    c: 1.0

  # Optimizer configuration
  optimizer_config:
    optimizer:
      _target_: torch.optim.AdamW
      lr: 1e-4
      betas: [0.9, 0.999]
      weight_decay: 1e-12
      fused: true

    scheduler:
      # _target_: chemflow.schedulers.LinearOneCycleLR
      # max_lr: 1e-3
      # warmup_steps: 1000
      _target_: chemflow.utils.lr_schedulers.CosineWarmupLR
      max_lr: 5e-4
      min_lr: 2e-4
      warmup_steps: 1000
      total_steps: 350000

    interval: step
    monitor: null

  # The 'model' key below is an argument to your LightningModule
  model:
    _target_: chemflow.model.model.BackboneWithHeads
    _recursive_: false

    embedding_backbone_args: ${model.embedding_backbone}

    backbone_model_args: ${model.backbone}

    heads_args: ${model.heads}
    ins_gmm_head_args: ${model.gmm_head_args}

    ins_edge_head_args:
      _target_: chemflow.model.heads.InsertionEdgeHead
      _recursive_: false
      hidden_dim: ${model.backbone.out_node_nf}  # Match your EGNN hidden dim
      n_edge_types: ${len:${data.vocab.edge_tokens}} # Your number of edge types
      n_atom_types: ${len:${data.vocab.atom_tokens}}  # Your number of atom types
      n_charge_types: ${len:${data.vocab.charge_tokens}}  # Your number of charge types
      rbf_embedding_args:
        _target_: chemflow.model.embedding.RBFEmbedding
        num_rbf: 128
        rbf_dmax: 3.5
        out_dim: 64
        dropout: 0.05
        trainable: false

atom_type_embedding:
  _target_: chemflow.model.embedding.Embedding
  num_embeddings: ${len:${data.vocab.atom_tokens}}
  embedding_dim: 64
  out_dim: 128

edge_type_embedding:
  _target_: chemflow.model.embedding.Embedding
  num_embeddings: ${len:${data.vocab.edge_tokens}}
  embedding_dim: 64
  out_dim: 128

time_embedding:
  _target_: chemflow.model.embedding.TimeEmbedding
  embedding_dim: 64
  out_dim: 128

node_count_embedding:
  _target_: chemflow.model.embedding.CountEmbedding
  embedding_dim: 64
  out_dim: 128

token_weighting:
  type_loss_token_weights: uniform
  weight_alpha: 0.4


embedding_backbone:
  _target_: chemflow.model.model.EmbeddingBackbone
  _recursive_: false
  atom_type_embedding_args: ${model.atom_type_embedding}
  edge_type_embedding_args: ${model.edge_type_embedding}
  time_embedding_args: ${model.time_embedding}
  node_count_embedding_args: ${model.node_count_embedding}
  cfg_embedding_args: ${cfg.cfg_embedding}
  h0_input_dim: ${oc.eval:"${model.atom_type_embedding.out_dim} + ${model.time_embedding.out_dim} + ${model.node_count_embedding.out_dim} + ${cfg.cfg_embed_dim}"}
  h0_projection_dim: ${oc.eval:"${model.atom_type_embedding.out_dim} + ${model.time_embedding.out_dim} + ${model.node_count_embedding.out_dim} + ${cfg.cfg_embed_dim}"}
  e_input_dim: ${model.edge_type_embedding.out_dim}
  e_projection_dim: ${model.edge_type_embedding.out_dim}

backbone:
  _target_: chemflow.model.backbones.egnn.EGNNWithEdgeType
  _recursive_: false
  in_node_nf: ${model.embedding_backbone.h0_projection_dim}
  hidden_nf: 256
  out_node_nf: 256
  in_edge_nf: ${model.embedding_backbone.e_projection_dim} # set to zero when not predicting edge types
  n_layers: 6
  residual: True
  attention: True
  normalize: True
  tanh: True
  rbf_embedding_args:
    _target_: chemflow.model.embedding.RBFEmbedding
    num_rbf: 128
    rbf_dmax: 3.5
    out_dim: 64
    dropout: 0.05
    trainable: false

heads:
  _target_: chemflow.model.heads.MultiHeadModule

  heads_configs:
    # Aggregation method for all graph heads
    graph_aggregation: mean  # Options: mean, sum, max
    
    node_heads:
      atom_type_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: ${len:${data.vocab.atom_tokens}}
        hidden_dim: 128

      charge_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: ${len:${data.vocab.charge_tokens}}
        hidden_dim: 128

      # Insertion rate head: output_dim depends on strategy
      ins_rate_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: 1
        hidden_dim: 128

      do_ins_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: 1
        hidden_dim: 128

      do_del_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: 1
        hidden_dim: 128

      do_sub_a_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: 1
        hidden_dim: 128
      
    edge_heads:

      edge_type_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: ${len:${data.vocab.edge_tokens}}
        hidden_dim: 128

      do_sub_e_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: 1
        hidden_dim: 128

gmm_head_args:
  _target_: chemflow.model.heads.EquivariantGMMHead
  _recursive_: false
  hidden_dim: ${model.backbone.out_node_nf}
  K: ${model.gmm_params.K}
  N_a: ${len:${data.vocab.atom_tokens}}
  N_c: ${len:${data.vocab.charge_tokens}}
  rbf_embedding_args:
    _target_: chemflow.model.embedding.RBFEmbedding
    num_rbf: 128
    rbf_dmax: 3.5
    out_dim: 64
    dropout: 0.05
    trainable: false
