## DiT backbone for QM9
gmm_params:
    K: 5
    D: 3

rotate: true

output_dim_typed: ${oc.eval:"${model.gmm_params.K} * (2 + ${model.gmm_params.D} + ${len:${data.vocab.atom_tokens}} + ${len:${data.vocab.charge_tokens}})"}
output_dim_untyped: ${oc.eval:"${model.gmm_params.K} * (3 +  ${model.gmm_params.D})"}

integrator:
  _target_: chemflow.flow_matching.integration.RateIntegrator
  vocab: ${data.vocab}
  distributions: None
  gmm_params: ${model.gmm_params}
  n_atoms_strategy: ${data.n_atoms_strategy}
  time_strategy: log
  num_integration_steps: 200
  del_schedule: ${data.interpolator.del_schedule}
  ins_schedule: ${data.interpolator.ins_schedule}
  sub_schedule: ${data.interpolator.sub_schedule}
  sub_e_schedule: ${data.interpolator.sub_e_schedule}

beta_sched:
  _target_: torch.distributions.Beta
  concentration1: 2.0
  concentration0: 1.0

linear_sched:
  _target_: torch.distributions.Uniform
  low: 0.0
  high: 1.0

# strategy used for sampling time during **training**
sample_time_strategy: linear

module:
  _target_: chemflow.model.lightning_module_transformer.LightningModuleRatesTransformer
  gmm_params: ${model.gmm_params}
  n_atoms_strategy: ${data.n_atoms_strategy}
  ins_noise_scale: ${data.ins_noise_scale}
  #edit_loss_ema_decay: 0.99
  #edit_loss_ema_eps: 1.0e-8
  ema_decay: 0.999
  use_ema_for_eval: true
  time_dist: ${if:${eq:${model.sample_time_strategy}, log}, ${model.beta_sched}, ${model.linear_sched}}
  integrator: ${model.integrator}

  cfg_adapter:
    _target_: chemflow.model.cfg.CFGAdapter
    cfg_dropout_prob: ${if:${model.do_cfg}, ${model.cfg.property_dropout_prob}, 0.0}
    cfg_guidance_scale: ${if:${model.do_cfg}, ${model.cfg.property_guidance_scale}, 0.0}
    natoms_cfg_dropout_prob: ${if:${model.do_cfg}, ${model.cfg.natoms_dropout_prob}, 0.0}
    natoms_cfg_guidance_scale: ${if:${model.do_cfg}, ${model.cfg.natoms_guidance_scale}, 0.0}
    mw_cfg_dropout_prob: ${if:${model.do_cfg}, ${model.cfg.mw_dropout_prob}, 0.0}
    mw_cfg_guidance_scale: ${if:${model.do_cfg}, ${model.cfg.mw_guidance_scale}, 0.0}

  vocab: ${data.vocab}
  
  # Loss component weights
  use_learnable_loss_weights: false
  loss_weights:
    l_do_sub_a: 1.0
    l_sub_a_class: 1.0
    l_do_sub_e: 1.0
    l_sub_e_class: 1.0
    l_do_del: 1.0
    l_do_ins: 1.0
    l_ins_rate: 1.0
    l_ins_gmm: 1.0
    l_ins_e: 1.0
    l_x: 1.0
    l_c: 1.0
    l_global_ins_budget: 0.0
    l_global_del_budget: 0.0

  # Optimizer configuration
  # MuonWithAuxAdam: Muon for 2D backbone weights, AdamW for the rest.
  optimizer_config:
    optimizer:
      lr: 0.002 #0.02
      momentum: 0.95
      weight_decay: 0.0

    aux_optimizer:
      lr: 3e-5 #3e-4
      betas: [0.9, 0.95]
      eps: 1e-10
      weight_decay: 0.0

    emb_optimizer:
      lr: 3e-4 #3e-3

    scheduler:
      _target_: chemflow.utils.lr_schedulers.MultiGroupCosineWarmupLR
      # We don't pass 'optimizer' here; we inject it in the Python script.
      warmup_steps: 1000        # Typically 2-5% of total_steps
      total_steps: 50000        # The total number of training iterations
      min_lr_fraction: 0.05      # Decays to 10% of the peak base_lrs defined in your optimizer
      last_epoch: -1

    interval: step
    monitor: null

  # The 'model' key is instantiated as the full DiTBackboneWithHeads
  model:
    _target_: chemflow.model.backbones.dit.DiTBackboneWithHeads
    _recursive_: false

    atom_type_embedding_args: ${model.atom_type_embedding}
    edge_type_embedding_args: ${model.edge_type_embedding}
    time_embedding_args: ${model.time_embedding}
    node_count_embedding_args: ${model.node_count_embedding}
    bond_degree_embedding_args: ${model.bond_degree_embedding}

    backbone_model_args: ${model.backbone}

    heads_args: ${model.heads}
    ins_gmm_head_args: ${model.gmm_head_args}
    cfg_embedding_args: ${model.cfg_embedding}
    ins_edge_head_args:
      _target_: chemflow.model.heads.InsertionEdgeHead
      _recursive_: false
      hidden_dim: ${model.backbone.out_node_nf}
      n_edge_types: ${len:${data.vocab.edge_tokens}}
      n_atom_types: ${len:${data.vocab.atom_tokens}}
      n_charge_types: ${len:${data.vocab.charge_tokens}}
      rbf_embedding_args:
        _target_: chemflow.model.embedding.RBFEmbedding
        num_rbf: 128
        rbf_dmax: 3.5
        out_dim: 64
        dropout: 0.05
        trainable: false

atom_type_embedding:
  _target_: chemflow.model.embedding.Embedding
  num_embeddings: ${len:${data.vocab.atom_tokens}}
  embedding_dim: 64
  out_dim: 128

edge_type_embedding:
  _target_: chemflow.model.embedding.Embedding
  num_embeddings: ${len:${data.vocab.edge_tokens}}
  embedding_dim: 64
  out_dim: 128

time_embedding:
  _target_: chemflow.model.embedding.TimeEmbedding
  embedding_dim: 64
  out_dim: 128

node_count_embedding:
  _target_: chemflow.model.embedding.CountEmbedding
  embedding_dim: 64
  out_dim: 128

token_weighting:
  type_loss_token_weights: training
  weight_alpha: 0.4

# ── Unified classifier-free guidance ──
do_cfg: true

cfg:
  embed_dim: 128
  # Property conditioning (num_properties=0 disables)
  num_properties: 0
  property_hidden_dim: 128
  property_dropout_prob: 0.15
  property_guidance_scale: 1.5
  # N-atoms conditioning
  use_natoms: true
  natoms_dropout_prob: 0.35
  natoms_guidance_scale: 1.0
  # MW conditioning
  use_mw: false
  mw_dropout_prob: 0.15
  mw_guidance_scale: 0.0
  # Unified embedding
  embedding:
    _target_: chemflow.model.embedding.UnifiedCFGEmbedding
    out_dim: ${model.cfg.embed_dim}
    num_properties: ${model.cfg.num_properties}
    property_hidden_dim: ${model.cfg.property_hidden_dim}
    use_natoms: ${model.cfg.use_natoms}
    use_mw: ${model.cfg.use_mw}

cfg_embedding: ${if:${model.do_cfg}, ${model.cfg.embedding}, null}
cfg_embed_dim: ${if:${model.do_cfg}, ${model.cfg.embed_dim}, 0}

bond_degree_embedding:
  _target_: chemflow.model.embedding.BondDegreeEmbedding
  n_edge_types: ${len:${data.vocab.edge_tokens}}
  out_dim: 128
bond_degree_embed_dim: 128

backbone:
  _target_: chemflow.model.backbones.dit.DiTBackbone
  _recursive_: false
  d_input: ${oc.eval:"${model.atom_type_embedding.out_dim} + ${model.bond_degree_embed_dim}"}
  d_cond: ${oc.eval:"${model.time_embedding.out_dim} + ${model.node_count_embedding.out_dim} + ${model.cfg_embed_dim}"}
  d_model: 512
  out_node_nf: 256
  num_layers: 8
  nhead: 16
  mlp_ratio: 4.0
  in_edge_nf: ${model.edge_type_embedding.out_dim}
  rbf_embedding_args:
    _target_: chemflow.model.embedding.RBFEmbedding
    num_rbf: 128
    rbf_dmax: 3.5
    out_dim: 64
    dropout: 0.05
    trainable: false

heads:
  _target_: chemflow.model.heads.MultiHeadModule

  heads_configs:
    graph_aggregation: mean
    
    node_heads:
      atom_type_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: ${len:${data.vocab.atom_tokens}}
        hidden_dim: 128

      charge_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: ${len:${data.vocab.charge_tokens}}
        hidden_dim: 128

      ins_rate_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: 1
        hidden_dim: 128

      do_ins_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: 1
        hidden_dim: 128

      do_del_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: 1
        hidden_dim: 128

      do_sub_a_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: 1
        hidden_dim: 128
      
    edge_heads:

      edge_type_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: ${len:${data.vocab.edge_tokens}}
        hidden_dim: 128

      do_sub_e_head:
        input_dim: ${model.backbone.out_node_nf}
        output_dim: 1
        hidden_dim: 128

gmm_head_args:
  _target_: chemflow.model.heads.EquivariantGMMHead
  _recursive_: false
  hidden_dim: ${model.backbone.out_node_nf}
  K: ${model.gmm_params.K}
  N_a: ${len:${data.vocab.atom_tokens}}
  N_c: ${len:${data.vocab.charge_tokens}}
  rbf_embedding_args:
    _target_: chemflow.model.embedding.RBFEmbedding
    num_rbf: 128
    rbf_dmax: 3.5
    out_dim: 64
    dropout: 0.05
    trainable: false
