## DiT backbone for QM9
gmm_params:
    K: 10
    D: 3

rotate: true
# Number of randomly-rotated copies per source molecule per training batch.
# When > 1, the dataloader requests batch_size.train // n_augmentations unique
# molecules per batch and the wrapper expands them with N independent random
# rotations. Requires rotate=true and batch_size.train % n_augmentations == 0.
n_augmentations: 1


integrator: ${integrator.integrator}

beta_sched:
  _target_: torch.distributions.Beta
  concentration1: 2.0
  concentration0: 1.0

linear_sched:
  _target_: torch.distributions.Uniform
  low: 0.0
  high: 1.0

# strategy used for sampling time during **training**
sample_time_strategy: linear


module:
  _target_: chemflow.model.lightning_module_transformer.LightningModuleRatesTransformer
  gmm_params: ${model.gmm_params}
  n_atoms_strategy: ${data.n_atoms_strategy}
  ins_noise_scale: ${data.ins_noise_scale}
  ema_decay: 0.999
  use_ema_for_eval: true
  time_dist: ${if:${eq:${model.sample_time_strategy}, log}, ${model.beta_sched}, ${model.linear_sched}}
  integrator: ${model.integrator}

  cfg_guidance: ${cfg.cfg_guidance}

  vocab: ${data.vocab}
  
  # Loss component weights
  use_learnable_loss_weights: false
  use_time_weights: false
  #loss_weights:
  #  do_sub_a: 1.0
  #  sub_a_class: 1.0
  #  do_sub_e: 1.0
  #  sub_e_class: 1.0
  #  do_del: 1.0
  #  do_ins: 1.0
  #  ins_rate: 1.0
  #  ins_gmm: 1.0
  #  ins_e: 1.0
  #  x: 1.0
  #  c: 1.0

  loss_weights:
    do_sub_a: 1.0
    sub_a_class: 1.0
    do_sub_e: 1.0
    sub_e_class: 1.0
    do_del: 1.0
    do_ins: 1.0
    ins_rate: 1.0
    ins_gmm: 1.0
    ins_e: 1.0
    x: 1.0
    c: 1.0
    ins_e_ii: 1.0

  # Optimizer configuration
  # MuonWithAuxAdam: Muon for 2D backbone weights, AdamW for the rest.
  optimizer_config:
    optimizer:
      lr: 0.01
      momentum: 0.95
      weight_decay: 0.0

    aux_optimizer:
      lr: 3e-4
      betas: [0.9, 0.95]
      eps: 1e-10
      weight_decay: 0.0

    emb_optimizer:
      lr: 3e-4

    scheduler:
      _target_: chemflow.utils.lr_schedulers.MultiGroupCosineWarmupLR
      # We don't pass 'optimizer' here; we inject it in the Python script.
      warmup_steps: 2000        # Typically 2-5% of total_steps
      total_steps: 200000        # The total number of training iterations
      min_lr_fraction: 0.05      # Decays to 10% of the peak base_lrs defined in your optimizer
      last_epoch: -1

    interval: step
    monitor: null

  # The 'model' key is instantiated as the full DiTBackboneWithHeads
  model:
    _target_: chemflow.model.backbones.dit.DiTBackboneWithHeads
    _recursive_: false

    atom_type_embedding_args: ${embeddings.atom_type_embedding}
    edge_type_embedding_args: ${embeddings.edge_type_embedding}
    time_embedding_args: ${embeddings.time_embedding}
    node_count_embedding_args: ${embeddings.node_count_embedding}

    backbone_model_args: ${model.backbone}

    heads_args: ${heads.heads}
    ins_gmm_head_args: ${heads.gmm_head}
    ins_edge_head_args: ${heads.ins_edge_head}
    cfg_embedding_args: ${cfg.cfg_embedding}

# Backbone dim references consumed by the shared heads config.
# DiT has scalar features only, so node and edge heads share out_node_nf.
head_node_dim: ${model.backbone.out_node_nf}
head_edge_dim: ${model.backbone.out_node_nf}

token_weighting:
  type_loss_token_weights: uniform
  weight_alpha: 0.4


backbone:
  _target_: chemflow.model.backbones.dit.DiTBackbone
  _recursive_: false
  d_input: ${embeddings.atom_type_embedding.out_dim}
  d_cond: ${oc.eval:"${embeddings.time_embedding.out_dim} + ${embeddings.node_count_embedding.out_dim} + ${cfg.cfg_embed_dim}"}
  d_model: 512
  out_node_nf: 256
  num_layers: 8
  nhead: 16
  mlp_ratio: 4.0
  in_edge_nf: ${embeddings.edge_type_embedding.out_dim}
  rbf_embedding_args:
    _target_: chemflow.model.embedding.RBFEmbedding
    num_rbf: 128
    rbf_dmax: 3.5
    out_dim: 64
    dropout: 0.0
    trainable: false
