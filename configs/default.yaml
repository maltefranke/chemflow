defaults:
  - _self_
  # Single-knob preset. `defaults=qm9` and `defaults=geom` each bundle
  # `data` + `embeddings` (with dataset-tuned ExtrapolatableCount params)
  # plus the shared `core` group selections. Override individual groups as
  # usual, e.g. `defaults=geom model=dit embeddings=qm9`.
  - defaults: qm9

# Run directory: outputs/<dataset>/<cfg_method>/<date>/<wandb_id>.
# wandb id is CHEMFLOW_RUN_ID (same as WANDB_RUN_ID). Set in the shell before
# torchrun, or set automatically for single-process runs in run.py before Hydra composes.
hydra:
  run:
    dir: ${hydra:runtime.cwd}/outputs/${hydra:runtime.choices.data}/${hydra:runtime.choices.cfg}/${now:%Y-%m-%d}/${oc.env:CHEMFLOW_RUN_ID}
