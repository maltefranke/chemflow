# @package _global_

## Put your callback args here
callbacks:
  monitor_metric: ${if:${eq:${representation},geometric_graph},val/validity,val/batch/pair_dist_l1}
  monitor_metric_mode: ${if:${eq:${representation},geometric_graph},max,min}

  #   model_checkpoints         -> best-by-metric (top-1, monitored)
  #   every_n_epochs_checkpoint -> latest (no monitor; overwrites every epoch)
  model_checkpoints:
    save_top_k: 1
    save_last: False
    verbose: False

  every_n_epochs_checkpoint:
    every_n_epochs: 1
    save_top_k: 1
    save_last: False
    verbose: False
    save_on_train_epoch_end: True # Force per-train-epoch firing
