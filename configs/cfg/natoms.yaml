# ── Classifier-free guidance on target atom count ──
do_cfg: true

cfg:
  embed_dim: 128

  natoms_dropout_prob: 0.0
  natoms_guidance_scale: 1.0

  # Encoder used to embed the n_atoms scalar.  Swap _target_ to
  # chemflow.model.embedding.ExtrapolatableCountEmbedding to extrapolate
  # to counts just outside the training support.
  natoms_encoder:
    _target_: chemflow.model.embedding.CountEmbedding
    embedding_dim: 64
    out_dim: 64
    max_period: 100.0

  embedding:
    _target_: chemflow.model.cfg.CFGEmbedding
    out_dim: ${cfg.cfg.embed_dim}
    signals:
      - _target_: chemflow.model.cfg.NAtomsSignal
        encoder_args: ${cfg.cfg.natoms_encoder}
        dropout_prob: ${cfg.cfg.natoms_dropout_prob}
        guidance_scale: ${cfg.cfg.natoms_guidance_scale}
        cfg_mode: linear

cfg_guidance:
    _target_: chemflow.model.cfg.CFGGuidance

cfg_embedding: ${cfg.cfg.embedding}
cfg_embed_dim: ${cfg.cfg.embed_dim}
