# ── Classifier-free guidance on RDKit Crippen logP ──
# logP is cached on the dataset element at __getitem__ time
# (see chemflow.dataset.qm9), so the signal reads `mols.logp` directly
# rather than re-parsing SMILES every step.
do_cfg: true

cfg:
  embed_dim: 128

  # dropout=0: model always sees the conditioning signal; no unconditional
  # branch is learned.  Bump to e.g. 0.15 for real CFG (allows
  # logp_guidance_scale > 1.0 at inference for stronger steering).
  logp_dropout_prob: 0.0
  # scale=1: guided output = uncond + 1*(cond - uncond) = cond exactly.
  logp_guidance_scale: 1.0
  logp_sinusoidal_dim: 64
  logp_max_period: 20.0

  # Optional external logP encoder (e.g. ExtrapolatableScalarEmbedding).
  # When non-null the legacy SinusoidalEncoding+MLP path is bypassed and the
  # external module handles the whole pipeline.  The encoder must accept a
  # Float Tensor [B] / [B, 1] and expose an `out_dim` attribute.
  #
  # To enable extrapolation past the training-distribution logP range, swap
  # this block out at training time via Hydra overrides, e.g.::
  #
  #   cfg.cfg.logp_encoder._target_=chemflow.model.embedding.ExtrapolatableScalarEmbedding \
  #   ++cfg.cfg.logp_encoder.embedding_dim=64 \
  #   ++cfg.cfg.logp_encoder.out_dim=64 \
  #   ++cfg.cfg.logp_encoder.min_period=16.0 \
  #   ++cfg.cfg.logp_encoder.max_period=64.0 \
  #   ++cfg.cfg.logp_encoder.value_min=-4.0 \
  #   ++cfg.cfg.logp_encoder.value_max=8.0
  logp_encoder: null

  embedding:
    _target_: chemflow.model.cfg.CFGEmbedding
    out_dim: ${cfg.cfg.embed_dim}
    signals:
      - _target_: chemflow.model.cfg.LogPSignal
        sinusoidal_dim: ${cfg.cfg.logp_sinusoidal_dim}
        max_period: ${cfg.cfg.logp_max_period}
        encoder_args: ${cfg.cfg.logp_encoder}
        dropout_prob: ${cfg.cfg.logp_dropout_prob}
        guidance_scale: ${cfg.cfg.logp_guidance_scale}
        cfg_mode: linear

cfg_guidance:
    _target_: chemflow.model.cfg.CFGGuidance

cfg_embedding: ${cfg.cfg.embedding}
cfg_embed_dim: ${cfg.cfg.embed_dim}
