# ── Classifier-free guidance on QM9 properties (default: HOMO-LUMO gap) ──
do_cfg: true

cfg:
  embed_dim: 128

  property_names: [gap]
  property_hidden_dim: 128
  property_dropout_prob: 0.0
  property_guidance_scale: 1.0

  embedding:
    _target_: chemflow.model.cfg.CFGEmbedding
    out_dim: ${cfg.cfg.embed_dim}
    signals:
      - _target_: chemflow.model.cfg.PropertySignal
        property_names: ${cfg.cfg.property_names}
        hidden_dim: ${cfg.cfg.property_hidden_dim}
        dropout_prob: ${cfg.cfg.property_dropout_prob}
        guidance_scale: ${cfg.cfg.property_guidance_scale}
        cfg_mode: linear

cfg_guidance:
    _target_: chemflow.model.cfg.CFGGuidance

cfg_embedding: ${cfg.cfg.embedding}
cfg_embed_dim: ${cfg.cfg.embed_dim}
