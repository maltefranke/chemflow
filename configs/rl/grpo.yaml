# @package _global_

defaults:
  - /default
  - _self_

hydra:
  job:
    # GRPO historically ran from the repository root. Keep that runtime shape
    # even when using @hydra.main; durable artifacts are anchored by PROJECT_ROOT.
    chdir: false
  run:
    # Mirror pretraining's layout but slot RL under its own `grpo/` group so
    # pretraining and RL outputs stay separated.
    dir: ${hydra:runtime.cwd}/outputs/${hydra:runtime.choices.data}/grpo/${now:%Y-%m-%d}/${oc.env:CHEMFLOW_RUN_ID}

# Match the old GRPO Slurm launcher, which used test batches of 128 prompts.
data:
  datamodule:
    batch_size:
      test: 128

# GRPO fine-tuning config.
rl:
  # Pretrained checkpoint to start from. Must carry `hyper_parameters.representation`.
  ckpt: ${oc.env:PROJECT_ROOT}/.pretrained_model/epoch=167-step=4009.ckpt
  # Saved under the per-run hydra dir so `.hydra/config.yaml`, the ckpts, and
  # the run log all live together.
  save:      ${hydra:runtime.output_dir}/grpo.pt
  save_best: ${hydra:runtime.output_dir}/grpo_best.pt
  n_updates: 200
  lr: 1e-4
  device: auto  # auto | cuda | cpu
  log_every: 1
  seed: 0
  max_atoms: 100

  # Best-checkpoint tracking inside rl.grpo.train
  best:
    ema_beta: 0.9
    warmup_steps: 3

  # Policy / objective settings mapped directly into rl.grpo.GRPOConfig.
  grpo:
    sigma_explore: 0.05
    clip_eps: 0.2
    eps_t: 0.01
    log_ratio_clamp: 20.0
    p_ins_clamp: 0.999
    num_integration_steps: 100
    max_grad_norm: 1.0  # null disables; <=0 is also treated as disabled
    group_size: 8
    kl_coef: 0.02
    kl_omit_pos: true
    update_passes: 2
    per_element_logp_mean: false

  # Reward registry key and optional REINVENT-style diversity wrapper.
  reward:
    name: n_atoms
    # Multiply reward by RDKit validity (0/1) per graph. MOLECULE only;
    # raises if true under any other representation.
    apply_validity_gate: true
    scaffold_diversity: true
    scaffold_bucket_size: 10
    scaffold_penalty: 0.5
    scaffold_window_batches: 50  # -1 = full-run memory; >=1 = rolling batches
    scaffold_labeled: false
    scaffold_diversity_key: canonical_smiles  # murcko | canonical_smiles

  # Weights & Biases logging for RL metrics. `group` is the right knob for sweep
  # aggregation; set it from the sweep wrapper.
  wandb:
    enabled: true
    project: chemflow-grpo-n_atoms
    name: ${oc.env:CHEMFLOW_RUN_ID,base}
    group: null
