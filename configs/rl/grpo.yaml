# @package _global_

defaults:
  - /default
  - _self_

hydra:
  job:
    # GRPO historically ran from the repository root. Keep that runtime shape
    # even when using @hydra.main; durable artifacts are anchored by PROJECT_ROOT.
    chdir: false
  run:
    # Mirror pretraining's layout but slot RL under its own `grpo/` group so
    # pretraining and RL outputs stay separated.
    dir: ${hydra:runtime.cwd}/outputs/${hydra:runtime.choices.data}/grpo/${now:%Y-%m-%d}/${oc.env:CHEMFLOW_RUN_ID}

# Match the old GRPO Slurm launcher, which used test batches of 128 prompts.
data:
  datamodule:
    batch_size:
      test: 128

# GRPO fine-tuning config.
rl:
  # Pretrained checkpoint to start from. Must carry `hyper_parameters.representation`.
  ckpt: ${oc.env:PROJECT_ROOT}/.pretrained_model/epoch=540-step=198547_tmqm_dit.ckpt
  # Saved under the per-run hydra dir so `.hydra/config.yaml`, the ckpts, and
  # the run log all live together.
  save:      ${hydra:runtime.output_dir}/grpo.pt
  save_best: ${hydra:runtime.output_dir}/grpo_best.pt
  n_updates: 1000
  lr: 3e-5
  device: auto  # auto | cuda | cpu
  log_every: 1
  seed: 0
  max_atoms: 120  # tmQM train tops out at ~101 atoms; headroom above that
  # Run module.batch_metrics + module.distribution_metrics on the final rollout
  # batch every N updates. 0 disables.
  diagnostics_every: 10

  # Best-checkpoint tracking inside rl.grpo.train
  best:
    ema_beta: 0.9
    warmup_steps: 3

  # Policy / objective settings mapped directly into rl.grpo.GRPOConfig.
  grpo:
    sigma_explore: 0.02  # calibrated for tmQM pointcloud rollouts (see force calib)
    clip_eps: 0.2
    eps_t: 0.01
    log_ratio_clamp: 20.0
    p_ins_clamp: 0.999
    num_integration_steps: 100
    max_grad_norm: 1.0  # null disables; <=0 is also treated as disabled
    group_size: 8
    kl_coef: 0.05
    kl_omit_pos: false
    update_passes: 1
    per_element_logp_mean: false

  # Reward + composable wrappers. Order of `wrappers:` is the order of
  # application; gates should run before diversity bucketing. Each entry has
  # `enabled` plus the wrapper-specific kwargs (passed verbatim to its make()).
  reward:
    # tmQM HOMO-LUMO gap maximization, gated by molSimplify+xTB validity
    # (validity is baked into the reward, so no validity wrapper is needed).
    name: tmqm_gap
    wrappers:
      # RDKit validity gate. MOLECULE only; raises under any other representation.
      validity_gate:
        enabled: false
      # Neutral organic XYZ validity gate (RDKit DetermineBonds).
      # Organic-only; would zero every TMC, so off for tmQM.
      organic_xyz_validity_gate:
        enabled: false
        cov_factor: 1.3  # covalent-radii scale for connectivity; lower = stricter
        max_iterations: 200
      # REINVENT-style scaffold-occurrence bucketing. Needs RDKit mols; off for tmQM.
      scaffold_diversity:
        enabled: false
        bucket_size: 10
        penalty: 0.5
        diversity_bucket: canonical_smiles  # murcko | canonical_smiles
        window_batches: 50                  # >=1 = rolling batches; full-run memory needs the wrapper directly
        generic_scaffold: true              # was scaffold_labeled=false

  # Weights & Biases logging for RL metrics. `group` is the right knob for sweep
  # aggregation; set it from the sweep wrapper.
  wandb:
    enabled: true
    project: chemflow-grpo-tmqm-gap
    name: ${oc.env:CHEMFLOW_RUN_ID,base}
    group: null
